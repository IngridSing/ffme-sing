<app-navbar></app-navbar>
<app-loading-spinner [show]="isLoading"></app-loading-spinner>

@if (!isLoading) {
    @if (isSuccess) {
        <section class="result-page success">
            <div class="result-content">
                <div class="icon">&#10004;</div>
                <h1>Paiement confirmé</h1>
                <p>{{ message }}</p>
                <p>Votre adhésion a été enregistrée avec succès.</p>
                <a class="btn" routerLink="/">Retour à l'accueil</a>
            </div>
        </section>
    } @else {
        <section class="result-page error">
            <div class="result-content">
                <div class="icon">&#10008;</div>
                <h1>Erreur de vérification</h1>
                <p>{{ message }}</p>
                <a class="btn" routerLink="/membre">Réessayer</a>
            </div>
        </section>
    }
}

<app-footer></app-footer>
